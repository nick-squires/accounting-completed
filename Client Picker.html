<style>
  body { overflow: hidden; }
  body[data-density="compact"] { --row-h: 30px; }
  body[data-density="comfy"]   { --row-h: 36px; }

  /* P&L table styles (lifted from Profit & Loss.html so the backdrop renders) */
  .pl-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
  .pl-table th, .pl-table td {
    padding: 0 12px; height: var(--row-h, 36px); text-align: right; white-space: nowrap;
    border-bottom: 1px solid hsl(var(--border) / 0.6); background: hsl(var(--card));
  }
  .pl-table thead th {
    position: sticky; top: 0; z-index: 3; height: 38px;
    background: hsl(var(--muted)); border-bottom: 1px solid hsl(var(--border));
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
    color: hsl(var(--text-soft));
  }
  .pl-table th.month-h.is-current { background: hsl(var(--accent)); color: hsl(var(--primary)); }
  .pl-table th.account-h, .pl-table td.account-c {
    text-align: left; position: sticky; left: 0; z-index: 1; min-width: 240px;
    box-shadow: 1px 0 0 hsl(var(--border) / 0.6);
  }
  .pl-table thead th.account-h { z-index: 4; }
  .pl-table tr.section td {
    background: hsl(var(--muted)); height: 34px; text-align: left;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: hsl(var(--text-soft)); font-weight: 500;
    border-top: 1px solid hsl(var(--border)); border-bottom: 1px solid hsl(var(--border));
  }
  .pl-table tr.account-row td.account-c { color: hsl(var(--foreground)); padding-left: 20px; }
  .pl-table tr.subtotal td {
    font-weight: 600; background: hsl(var(--muted));
    border-top: 1px solid hsl(var(--border-strong)); border-bottom: 1px solid hsl(var(--border-strong));
  }
  .pl-table tr.gross td {
    background: hsl(var(--accent)); color: hsl(var(--primary)); font-weight: 600;
    border-top: 1px solid hsl(var(--primary) / 0.25); border-bottom: 1px solid hsl(var(--primary) / 0.25);
  }
  .pl-table tr.total td {
    font-weight: 600; border-top: 1px solid hsl(var(--border-strong));
    border-bottom: 3px double hsl(var(--border-strong)); background: hsl(var(--card));
  }
  .pl-table tr.total td.ytd { color: hsl(var(--primary)); }
  .pl-table td.num {
    font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums; font-feature-settings: "zero","tnum";
    letter-spacing: 0.01em;
  }
  .pl-table td.num.zero  { color: hsl(var(--text-soft)); }
  .pl-table td.num.neg   { color: hsl(var(--destructive)); }
  .pl-table td.num.future{ color: hsl(var(--text-soft)); background: hsl(var(--muted)); }
  .pl-table td.num.ytd   { background: hsl(var(--muted)); font-weight: 600; }
  .pl-table th.ytd-h     { background: hsl(var(--secondary)); color: hsl(var(--foreground)); border-left: 1px solid hsl(var(--border)); }
  .pl-table td.ytd       { border-left: 1px solid hsl(var(--border) / 0.6); }
  .pl-table th.pct-h, .pl-table td.pct {
    width: 64px; color: hsl(var(--text-soft));
    border-left: 1px solid hsl(var(--border) / 0.6);
  }
  .pl-table td.pct {
    font-family: "IBM Plex Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums;
  }
</style>
</head>
