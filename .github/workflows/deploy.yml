name: Deploy

# Builds a container image, pushes it to GitHub Container Registry, and updates the
# matching Azure App Service (which runs in container mode).
#   push to main           -> image :dev  -> accounting-completed-dev
#   manual run (prd input) -> image :prd  -> accounting-completed-prd

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prd]
        default: dev

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # GitHub Environment gates prd behind required reviewers (configure in repo settings).
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target
        id: t
        run: echo "tag=${{ github.event.inputs.environment || 'dev' }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.t.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update App Service to the new image
        uses: azure/webapps-deploy@v3
        with:
          app-name: accounting-completed-${{ steps.t.outputs.tag }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE }}:${{ steps.t.outputs.tag }}
